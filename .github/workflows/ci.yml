name: CI

# Run on every push and pull request targeting main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---- Job 1: fast quality gate (lint + unit tests) ----
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint with ruff
        run: ruff check src tests

      - name: Run unit tests
        run: pytest

  # ---- Job 2: integration (full pipeline + Docker build) ----
  pipeline-and-docker:
    runs-on: ubuntu-latest
    needs: lint-and-test          # only runs if Job 1 passes
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate synthetic data (CI has no real dataset)
        run: python scripts/generate_synthetic_data.py

      - name: Run the full pipeline
        run: |
          python -m src.data_ingestion
          python -m src.train
          python -m src.register_model
          python -m src.export_model

      - name: Build the Docker image
        run: docker build -t churn-api .
