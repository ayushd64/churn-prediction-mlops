# ============================================================
# Project Configuration
# All paths & parameters live here — NEVER hardcode them in code.
# ============================================================

# --- Data paths (relative to the project root) ---
data:
  raw_path: "data/raw/telco_churn.csv"
  processed_dir: "data/processed"

# --- Column settings ---
columns:
  target: "Churn"                # the column we're predicting
  id_column: "customerID"        # identifier — dropped before modeling

# --- Train/test split ---
split:
  test_size: 0.2                 # hold out 20% for testing
  random_state: 42               # fixed seed → reproducible splits

# --- Feature types (numeric features are scaled; everything else is one-hot encoded) ---
features:
  numeric:
    - tenure
    - MonthlyCharges
    - TotalCharges

# --- MLflow tracking ---
mlflow:
  tracking_uri: "sqlite:///mlflow.db"   # local SQLite backend (NOT the deprecated ./mlruns file store)
  experiment_name: "churn-prediction"

# --- Models to train & compare (each becomes its own MLflow run) ---
models:
  logistic_regression:
    type: "LogisticRegression"
    params:
      max_iter: 1000
      class_weight: "balanced"
      random_state: 42
  random_forest:
    type: "RandomForestClassifier"
    params:
      n_estimators: 200
      max_depth: 12
      class_weight: "balanced"
      n_jobs: -1
      random_state: 42
  xgboost:
    type: "XGBClassifier"
    params:
      n_estimators: 300
      max_depth: 5
      learning_rate: 0.1
      subsample: 0.9
      colsample_bytree: 0.9
      scale_pos_weight: 2.77   # neg/pos ratio (~5174/1869) — XGBoost's imbalance handling
      tree_method: "hist"      # the histogram algorithm (required for GPU)
      device: "cuda"           # use the GPU; auto-falls-back to CPU if none found
      random_state: 42
      n_jobs: -1


# --- Model Registry ---
registry:
  model_name: "churn-model"
  primary_metric: "roc_auc"   # the winner is chosen by this metric
  champion_alias: "champion"  # alias marking the production model
  